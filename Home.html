<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homigo - Find Your Home</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Homigo</h1>
      <nav>
        <a href="available_listing.html">Listings</a>
        <a href="about.html">About</a>
        <a href="Register.html" class="nav-button">Register</a>
      </nav>
    </header>

    <div class="main-content home-main-content">
      <div class="form-card">
        <h2>Sign In</h2>

        <form action="" method="post">
          <div class="form-group">
            <label for="Email">Email Address</label>
            <input
              type="email"
              id="Email"
              name="Email"
              placeholder="you@example.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="Password">Password</label>
            <input
              type="password"
              id="Password"
              name="Password"
              placeholder="••••••••"
              required
            />
          </div>

          <input type="submit" value="Sign In" />
        </form>

        <div class="forgot-password">
          <a href="Change_password.html">Forgot or Change your Password?</a>
        </div>
      </div>
    </div>
    <footer>
      <p>Copyright © 2025 Homigo | All Rights Reserved.</p>
    </footer>
  </body>
</html>
